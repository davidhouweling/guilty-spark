name: Deploy Pages

permissions:
  contents: read
  deployments: write

on:
  workflow_dispatch:
    inputs:
      cleanup_old_deployments:
        description: "Delete stale Pages preview deployments"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    if: github.event_name == 'push' || (github.event_name == 'pull_request_target' && github.event.action != 'closed')
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          # For Dependabot and trusted collaborators: checkout PR code.
          # For external PRs: checkout base branch (prevents malicious code execution).
          ref: ${{ (github.actor == 'dependabot[bot]' || github.actor == 'davidhouweling') && github.event.pull_request.head.sha || github.base_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build pages
        run: npm run build:pages

      - name: Deploy to Production
        if: github.event_name == 'push'
        id: deploy-production
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: "pages"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Compute preview alias
        if: github.event_name == 'pull_request_target' && (github.actor == 'dependabot[bot]' || github.actor == 'davidhouweling')
        id: preview-alias
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          # Cloudflare preview-alias URLs are "<alias>-<worker>.<subdomain>.workers.dev";
          # the leftmost DNS label (alias + "-guilty-spark-web") must be <= 63 chars, so
          # cap the alias at 40 and reduce the branch to lowercase [a-z0-9-].
          alias=$(printf '%s' "$HEAD_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-40 \
            | sed -E 's/-+$//')
          if [ -z "$alias" ]; then
            alias="pr-${PR_NUMBER}"
          fi
          echo "alias=$alias" >> "$GITHUB_OUTPUT"

      - name: Deploy Preview (Dependabot only)
        if: github.event_name == 'pull_request_target' && (github.actor == 'dependabot[bot]' || github.actor == 'davidhouweling')
        id: deploy-preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: "pages"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Upload a per-branch preview version (does not touch the production
          # deployment); --preview-alias gives a stable branch-specific URL.
          command: versions upload --preview-alias ${{ steps.preview-alias.outputs.alias }}

      - name: Resolve preview URL
        if: github.event_name == 'pull_request_target' && (github.actor == 'dependabot[bot]' || github.actor == 'davidhouweling')
        id: preview-url
        env:
          WRANGLER_OUTPUT: ${{ steps.deploy-preview.outputs.command-output }}
          ALIAS: ${{ steps.preview-alias.outputs.alias }}
        run: |
          # Prefer the stable branch alias URL; fall back to the per-version preview URL.
          url=$(printf '%s' "$WRANGLER_OUTPUT" \
            | grep -oE "https://${ALIAS}-guilty-spark-web\.[a-z0-9-]+\.workers\.dev" \
            | head -1)
          if [ -z "$url" ]; then
            url=$(printf '%s' "$WRANGLER_OUTPUT" \
              | grep -oE 'https://[a-z0-9.-]+\.workers\.dev' \
              | head -1)
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Update GitHub deployment
        if: github.event_name == 'push' || github.actor == 'dependabot[bot]' || github.actor == 'davidhouweling'
        id: update_deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          environment: ${{ github.event_name == 'push' && 'pages-production' || format('pages-preview-pr-{0}', github.event.number) }}
          environment-url: ${{ steps.deploy-production.outputs.deployment-url || steps.preview-url.outputs.url }}
          initial-status: success
          auto-inactive: true
          transient-environment: ${{ github.event_name != 'push' }}

  close-preview-deployment:
    name: Close preview deployment
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete PR preview deployments
        uses: actions/github-script@v7
        env:
          PREVIEW_ENVIRONMENT: ${{ format('pages-preview-pr-{0}', github.event.number) }}
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const environment = process.env.PREVIEW_ENVIRONMENT;
            const { owner, repo } = context.repo;
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              environment,
              per_page: 100,
            });

            core.info(`Found ${deployments.length} deployments in ${environment}`);

            for (const deployment of deployments) {
              try {
                await github.rest.repos.createDeploymentStatus({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  state: "inactive",
                  description: "PR closed",
                  auto_inactive: false,
                });

                await github.rest.repos.deleteDeployment({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                });
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                core.warning(`Failed to delete deployment ${deployment.id}: ${message}`);
              }
            }

  cleanup-old-deployments:
    name: Cleanup stale deployments
    if: github.event_name == 'workflow_dispatch' && inputs.cleanup_old_deployments == true
    runs-on: ubuntu-latest

    steps:
      - name: Delete stale preview deployments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              per_page: 100,
            });

            const byEnvironment = new Map();
            for (const deployment of deployments) {
              const list = byEnvironment.get(deployment.environment) ?? [];
              list.push(deployment);
              byEnvironment.set(deployment.environment, list);
            }

            const shouldDeactivate = (environment, index) => {
              if (environment === "pages-production") {
                return index > 0;
              }

              if (environment.startsWith("pages-preview-pr-")) {
                return index > 0;
              }

              // Legacy environments from the previous workflow naming.
              if (environment === "production") {
                return index > 0;
              }

              if (environment === "preview") {
                return true;
              }

              return false;
            };

            let deletedCount = 0;

            for (const [environment, envDeployments] of byEnvironment.entries()) {
              envDeployments.sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at));

              for (let index = 0; index < envDeployments.length; index += 1) {
                const deployment = envDeployments[index];
                if (!shouldDeactivate(environment, index)) {
                  continue;
                }

                try {
                  await github.rest.repos.createDeploymentStatus({
                    owner,
                    repo,
                    deployment_id: deployment.id,
                    state: "inactive",
                    description: "Stale deployment cleanup",
                    auto_inactive: false,
                  });

                  await github.rest.repos.deleteDeployment({
                    owner,
                    repo,
                    deployment_id: deployment.id,
                  });

                  deletedCount += 1;
                } catch (error) {
                  const message = error instanceof Error ? error.message : String(error);
                  core.warning(`Failed to delete deployment ${deployment.id}: ${message}`);
                }
              }
            }

            core.notice(`Deleted ${deletedCount} stale deployments.`);
