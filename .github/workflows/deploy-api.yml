name: Deploy API

permissions:
  contents: read
  deployments: write

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Debug the event payload"
        required: false
        type: boolean
      cleanup_old_deployments:
        description: "Delete stale API deployments, including legacy Staging"
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows: [Typecheck]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    steps:
      - name: Debug
        if: ${{ github.event.inputs.debug == true }}
        run: ${{ tojson(github.event) }}
        shell: cat {0}

      - name: Check out Git repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Worker and Generate Source Maps
        working-directory: ./api
        run: |
          echo "🔨 Building worker with source maps..."
          npx wrangler deploy --env=${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }} --dry-run --outdir=./.wrangler/build

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: "api"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
          command: deploy --upload-source-maps
          vars: |
            DISCORD_APP_ID
            DISCORD_PUBLIC_KEY
            XBOX_USERNAME
            PROXY_WORKER_URL
            MICROSOFT_CLIENT_ID
            MICROSOFT_TENANT
            MICROSOFT_REDIRECT_URI
            MICROSOFT_SCOPES
          secrets: |
            DISCORD_TOKEN
            XBOX_PASSWORD
            PROXY_WORKER_TOKEN
            MICROSOFT_CLIENT_SECRET
            SESSION_SECRET
            TOKEN_ENCRYPTION_SECRET
        env:
          DISCORD_APP_ID: ${{ vars.DISCORD_APP_ID }}
          DISCORD_PUBLIC_KEY: ${{ vars.DISCORD_PUBLIC_KEY }}
          XBOX_USERNAME: ${{ vars.XBOX_USERNAME }}
          PROXY_WORKER_URL: ${{ vars.PROXY_WORKER_URL }}
          MICROSOFT_CLIENT_ID: ${{ vars.MICROSOFT_CLIENT_ID }}
          MICROSOFT_TENANT: ${{ vars.MICROSOFT_TENANT }}
          MICROSOFT_REDIRECT_URI: ${{ vars.MICROSOFT_REDIRECT_URI }}
          MICROSOFT_SCOPES: ${{ vars.MICROSOFT_SCOPES }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          XBOX_PASSWORD: ${{ secrets.XBOX_PASSWORD }}
          PROXY_WORKER_TOKEN: ${{ secrets.PROXY_WORKER_TOKEN }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          TOKEN_ENCRYPTION_SECRET: ${{ secrets.TOKEN_ENCRYPTION_SECRET }}

      - name: Resolve deployment URL
        id: resolve-url
        env:
          WRANGLER_DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          WRANGLER_OUTPUT: ${{ steps.deploy.outputs.command-output }}
          DEPLOY_ENV: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
        run: |
          url=""

          # Use wrangler's URL output when it already includes an http(s) scheme.
          if [ -z "$url" ] && printf '%s' "$WRANGLER_DEPLOYMENT_URL" | grep -Eq '^https?://'; then
            url="$WRANGLER_DEPLOYMENT_URL"
          fi

          # If wrangler returned a bare host, normalize it to an https URL.
          if [ -z "$url" ] && [ -n "$WRANGLER_DEPLOYMENT_URL" ]; then
            if printf '%s' "$WRANGLER_DEPLOYMENT_URL" | grep -Eq '^[a-z0-9.-]+(/.*)?$'; then
              url="https://$WRANGLER_DEPLOYMENT_URL"
            fi
          fi

          # Fallback: parse the first URL from wrangler command output.
          if [ -z "$url" ]; then
            url=$(printf '%s' "$WRANGLER_OUTPUT" | grep -oE 'https://[^[:space:]]+' | head -1)
          fi

          # Final fallback to stable API hostnames.
          if [ -z "$url" ]; then
            url="https://api-staging.guilty-spark.app"
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Update GitHub deployment
        id: update_deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha }}
          environment: ${{ github.event.workflow_run.head_branch == 'main' && 'Production' || 'api-staging' }}
          environment-url: ${{ github.event.workflow_run.head_branch == 'main' && 'https://guilty-spark.app' || steps.resolve-url.outputs.url }}
          initial-status: success
          auto-inactive: true
          transient-environment: ${{ github.event.workflow_run.head_branch != 'main' }}

      - name: Set output directories
        run: |
          echo "WRANGLER_BUILD_DIR=api/.wrangler/build" >> $GITHUB_ENV

      - name: Upload Source Maps to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -d "$WRANGLER_BUILD_DIR" ] && ls "$WRANGLER_BUILD_DIR"/*.map 1> /dev/null 2>&1; then
            echo "🗺️ Uploading source maps to Sentry..."
            RELEASE="${{ github.sha }}"
            ENVIRONMENT="${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}"
            
            npx sentry-cli releases new "$RELEASE" --org david-houweling --project guilty-spark
            npx sentry-cli releases set-commits "$RELEASE" --org david-houweling --project guilty-spark --auto --ignore-missing
            npx sentry-cli sourcemaps inject --org david-houweling --project guilty-spark "$WRANGLER_BUILD_DIR"
            npx sentry-cli sourcemaps upload --org david-houweling --project guilty-spark --release "$RELEASE" "$WRANGLER_BUILD_DIR"
            npx sentry-cli releases deploys "$RELEASE" new --org david-houweling --project guilty-spark --env "$ENVIRONMENT"
            npx sentry-cli releases finalize "$RELEASE" --org david-houweling --project guilty-spark
            
            echo "✅ Source maps uploaded successfully for release $RELEASE"
          else
            echo "⚠️ No source maps found, skipping Sentry upload"
          fi
  deploy-cancel:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - run: echo 'The triggering workflow failed'
      - run: exit 1

  cleanup-old-deployments:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.cleanup_old_deployments == true
    steps:
      - name: Delete stale API deployments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEPLOY_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              per_page: 100,
            });

            const byEnvironment = new Map();
            for (const deployment of deployments) {
              const list = byEnvironment.get(deployment.environment) ?? [];
              list.push(deployment);
              byEnvironment.set(deployment.environment, list);
            }

            const shouldDeactivate = (environment, index) => {
              if (environment === "Production" || environment === "api-staging") {
                return index > 0;
              }

              // Legacy API production naming.
              if (environment === "api-production") {
                return true;
              }

              // Legacy environments from earlier API workflow naming.
              if (environment === "staging") {
                return true;
              }

              // Older legacy environment name.
              if (environment === "Staging") {
                return true;
              }

              return false;
            };

            let deletedCount = 0;

            for (const [environment, envDeployments] of byEnvironment.entries()) {
              envDeployments.sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at));

              for (let index = 0; index < envDeployments.length; index += 1) {
                const deployment = envDeployments[index];
                if (!shouldDeactivate(environment, index)) {
                  continue;
                }

                try {
                  await github.rest.repos.createDeploymentStatus({
                    owner,
                    repo,
                    deployment_id: deployment.id,
                    state: "inactive",
                    description: "Stale deployment cleanup",
                    auto_inactive: false,
                  });

                  await github.rest.repos.deleteDeployment({
                    owner,
                    repo,
                    deployment_id: deployment.id,
                  });

                  deletedCount += 1;
                } catch (error) {
                  const message = error instanceof Error ? error.message : String(error);
                  core.warning(`Failed to delete deployment ${deployment.id}: ${message}`);
                }
              }
            }

            core.notice(`Deleted ${deletedCount} stale API deployments.`);
